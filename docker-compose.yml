version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wallet_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./src/migrations:/migrations

    command: >
      sh -c "
      psql postgresql://postgres:postgres@db:5432/wallet_db \
      -f /migrations/001_init.sql
      "

  app:
    build: .

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/wallet_db

    depends_on:
      migrate:
        condition: service_completed_successfully

    command: npm start
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data: